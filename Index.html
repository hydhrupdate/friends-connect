<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Connect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:36px;border-radius:16px;width:340px}
h2{font-size:22px;font-weight:800;margin-bottom:4px}
h2 span{color:#059669}
p{color:#666;font-size:13px;margin-bottom:20px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:5px}
input{width:100%;padding:12px;border:2px solid #eee;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none}
input:focus{border-color:#059669}
button{width:100%;padding:13px;background:#059669;border:none;border-radius:8px;color:white;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:#047857}
.msg{margin-top:10px;padding:8px;border-radius:6px;font-size:13px;text-align:center;display:none}
.err{background:#fee2e2;color:#dc2626}
.ok{background:#d1fae5;color:#059669}
</style>
</head>
<body>
<div class="box">
  <h2>HR <span>Connect</span></h2>
  <p>Sign in to your portal</p>
  <label>Employee ID / Admin ID</label>
  <input type="text" id="uid" placeholder="e.g. HRADMIN or EMP001" />
  <label>Password</label>
  <input type="password" id="pwd" placeholder="Enter password" />
  <button onclick="doLogin()">Sign In</button>
  <div class="msg" id="msg"></div>
</div>

<script>
function doLogin() {
  var id = document.getElementById('uid').value.trim().toUpperCase();
  var pwd = document.getElementById('pwd').value.trim();
  
  if (!id || !pwd) {
    show('Please enter ID and password', 'err');
    return;
  }
  
  if (id === 'HRADMIN' && pwd === 'hr@2024') {
    show('Login successful! Loading...', 'ok');
    setTimeout(function() {
      showDashboard();
    }, 500);
    return;
  }
  
  show('Invalid credentials. Try HRADMIN / hr@2024', 'err');
}

function show(msg, type) {
  var el = document.getElementById('msg');
  el.textContent = msg;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});


function showDashboard() {
  document.body.style.background = '#f8fafc';
  document.body.style.display = 'block';
  document.querySelector('.box').parentElement.style.display = 'none';
  
  var dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  
  // Load updates
  loadAllData();
  renderDash('feed');
}

var S = {
  updates: [], assocs: [], page: 'feed',
  tag: 'announcement', vis: ['all'], popts: ['',''], filter: 'all'
};
var PROJECT = "hr-connect-3c286";
var APIKEY = "AIzaSyA-5I3dKQnFaYF0I1tOUyYcRP-mhgEBlW0";
var BASE = "https://firestore.googleapis.com/v1/projects/" + PROJECT + "/databases/(default)/documents/";

async function fsGet(col) {
  try {
    var r = await fetch(BASE + col + "?key=" + APIKEY + "&pageSize=200");
    var d = await r.json();
    return (d.documents||[]).map(function(doc){ return Object.assign({fid:doc.name.split('/').pop()}, parseDoc(doc.fields)); });
  } catch(e) { return []; }
}

async function fsAdd(col, obj) {
  await fetch(BASE + col + "?key=" + APIKEY, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields:toF(obj)})});
}

async function fsDel(col, id) {
  await fetch(BASE + col + "/" + id + "?key=" + APIKEY, {method:'DELETE'});
}

async function fsPatch(col, id, obj) {
  var fields = toF(obj);
  var mask = Object.keys(fields).map(function(k){return "updateMask.fieldPaths="+k;}).join("&");
  await fetch(BASE + col + "/" + id + "?key=" + APIKEY + "&" + mask, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields:fields})});
}

function toF(obj) {
  var f = {};
  Object.keys(obj).forEach(function(k) {
    var v = obj[k];
    if (Array.isArray(v)) f[k] = {arrayValue:{values:v.map(function(i){return {stringValue:String(i)};})}};
    else if (typeof v === 'object' && v !== null) f[k] = {mapValue:{fields:toF(v)}};
    else if (typeof v === 'number') f[k] = {integerValue:String(v)};
    else if (typeof v === 'boolean') f[k] = {booleanValue:v};
    else f[k] = {stringValue:String(v||'')};
  });
  return f;
}

function parseDoc(fields) {
  if (!fields) return {};
  var obj = {};
  Object.keys(fields).forEach(function(k) {
    var v = fields[k];
    if ('stringValue' in v) obj[k] = v.stringValue;
    else if ('integerValue' in v) obj[k] = parseInt(v.integerValue);
    else if ('booleanValue' in v) obj[k] = v.booleanValue;
    else if ('arrayValue' in v) obj[k] = (v.arrayValue.values||[]).map(function(i){return i.stringValue||String(i.integerValue||'');});
    else if ('mapValue' in v) obj[k] = parseDoc(v.mapValue.fields);
    else if ('timestampValue' in v) obj[k] = v.timestampValue;
  });
  return obj;
}

async function loadAllData() {
  S.updates = await fsGet('updates');
  S.updates.sort(function(a,b){ return (b.createdAt||'') > (a.createdAt||'') ? 1 : -1; });
  S.assocs = await fsGet('associates');
  renderDash(S.page);
}

function renderDash(page) {
  S.page = page;
  var nav = document.getElementById('dnav');
  var items = [{id:'feed',l:'Updates'},{id:'post',l:'Post Update'},{id:'poll',l:'Create Poll'},{id:'assocs',l:'Associates'}];
  nav.innerHTML = items.map(function(i){ return '<button onclick="renderDash(\''+i.id+'\')" style="padding:10px 16px;border:none;background:'+(page===i.id?'#059669':'transparent')+';color:'+(page===i.id?'white':'#64748b')+';font-weight:700;font-size:13px;cursor:pointer;border-radius:6px">'+i.l+'</button>'; }).join('');
  
  var main = document.getElementById('dmain');
  if (page==='feed') renderFeed(main);
  else if (page==='post') renderPost(main);
  else if (page==='poll') renderPollPg(main);
  else if (page==='assocs') renderAssocsPg(main);
}

function renderFeed(main) {
  var fls=['all','announcement','policy','event','reminder','poll'];
  var fln={all:'All',announcement:'Announcements',policy:'Policy',event:'Events',reminder:'Reminders',poll:'Polls'};
  var stats='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'+
    ['Active:'+S.assocs.filter(function(a){return a.status==='active';}).length,
     'Updates:'+S.updates.filter(function(u){return u.type==='update';}).length,
     'Polls:'+S.updates.filter(function(u){return u.type==='poll';}).length,
     'Inactive:'+S.assocs.filter(function(a){return a.status==='inactive';}).length
    ].map(function(s){var p=s.split(':');return '<div style="background:white;border-radius:10px;border:1px solid #e5e7eb;padding:14px"><div style="font-size:24px;font-weight:800">'+p[1]+'</div><div style="font-size:11px;color:#64748b">'+p[0]+'</div></div>';}).join('')+'</div>';
  
  var pills='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">'+fls.map(function(f){return '<button onclick="S.filter=\''+f+'\';renderDash(\'feed\')" style="padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid '+(S.filter===f?'#111827':'#e5e7eb')+';background:'+(S.filter===f?'#111827':'white')+';color:'+(S.filter===f?'white':'#64748b')+'">'+fln[f]+'</button>';}).join('')+'</div>';
  
  var items = S.updates.filter(function(u){ return S.filter==='all'||(u.type==='poll'?S.filter==='poll':u.tag===S.filter); });
  var html = items.length===0?'<div style="text-align:center;padding:40px;color:#94a3b8">No updates yet. Post your first update!</div>':
    items.map(function(item){ return item.type==='poll'?makePoll(item):makeUpdate(item); }).join('');
  
  main.innerHTML = stats + pills + html;
}

function makeUpdate(u) {
  var colors={announcement:'#d1fae5|#059669',policy:'#fef3c7|#d97706',event:'#dbeafe|#2563eb',reminder:'#fee2e2|#dc2626',general:'#f1f5f9|#64748b'};
  var c=(colors[u.tag]||colors.general).split('|');
  return '<div style="background:white;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
    '<span style="background:'+c[0]+';color:'+c[1]+';font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase">'+(u.tag||'general')+'</span>'+
    '<button onclick="delUpdate(\''+u.fid+'\')" style="background:none;border:none;color:#dc2626;font-size:11px;cursor:pointer">Delete</button></div>'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:4px">'+esc(u.title||'')+'</div>'+
    '<div style="font-size:13px;color:#4b5563;line-height:1.6;white-space:pre-wrap">'+esc(u.body||'')+'</div>'+
    '<div style="margin-top:8px;font-size:11px;color:#94a3b8">By '+(u.author||'HR')+'</div></div>';
}

function makePoll(p) {
  var tot=0;
  if(p.votes && typeof p.votes==='object') Object.keys(p.votes).forEach(function(k){tot+=parseInt(p.votes[k])||0;});
  var opts=(p.options||[]).map(function(opt){
    var c=p.votes&&p.votes[opt]?parseInt(p.votes[opt]):0;
    var pc=tot>0?Math.round(c/tot*100):0;
    return '<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:3px"><span>'+esc(opt)+'</span><span>'+c+' ('+pc+'%)</span></div><div style="height:6px;background:#e5e7eb;border-radius:10px"><div style="height:100%;width:'+pc+'%;background:#059669;border-radius:10px"></div></div></div>';
  }).join('');
  return '<div style="background:white;border-radius:10px;border:1.5px solid #dbeafe;padding:16px;margin-bottom:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span style="background:#dbeafe;color:#2563eb;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px">POLL</span>'+
    '<button onclick="delUpdate(\''+p.fid+'\')" style="background:none;border:none;color:#dc2626;font-size:11px;cursor:pointer">Delete</button></div>'+
    '<div style="font-size:15px;font-weight:700;margin-bottom:10px">'+esc(p.question||'')+'</div>'+opts+
    '<div style="font-size:11px;color:#94a3b8;margin-top:6px">'+tot+' total votes</div></div>';
}

async function delUpdate(id) {
  if(!confirm('Delete?'))return;
  await fsDel('updates',id);
  await loadAllData();
}

function renderPost(main) {
  var tags=['announcement','policy','event','reminder','general'];
  var th=tags.map(function(t){return '<button onclick="S.tag=\''+t+'\';renderDash(\'post\')" style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid '+(S.tag===t?'#059669':'#e5e7eb')+';background:'+(S.tag===t?'#d1fae5':'white')+';color:'+(S.tag===t?'#059669':'#64748b')+'">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';}).join(' ');
  main.innerHTML='<div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:20px">'+
    '<h3 style="margin-bottom:14px">Post New Update</h3>'+
    '<input id="pt" placeholder="Title..." style="width:100%;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px"/>'+
    '<textarea id="pb" placeholder="Message..." style="width:100%;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;min-height:90px;resize:vertical;margin-bottom:10px;font-family:Arial"></textarea>'+
    '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#64748b;margin-bottom:6px">Tag</div><div style="display:flex;gap:5px;flex-wrap:wrap">'+th+'</div></div>'+
    '<button onclick="subPost()" style="background:#059669;color:white;border:none;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Publish Update</button>'+
    '<span id="pmsg" style="margin-left:10px;font-size:13px;color:#059669"></span></div>';
}

async function subPost() {
  var t=document.getElementById('pt').value.trim();
  var b=document.getElementById('pb').value.trim();
  if(!t||!b){alert('Enter title and message.');return;}
  document.getElementById('pmsg').textContent='Publishing...';
  await fsAdd('updates',{type:'update',title:t,body:b,tag:S.tag,visibility:['all'],author:'HR Admin',createdAt:new Date().toISOString()});
  await loadAllData();
  renderDash('feed');
}

function renderPollPg(main) {
  var oh=S.popts.map(function(o,i){return '<div style="display:flex;gap:7px;margin-bottom:7px"><input value="'+esc(o)+'" oninput="S.popts['+i+']=this.value" placeholder="Option '+(i+1)+'..." style="flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none"/>'+(S.popts.length>2?'<button onclick="S.popts.splice('+i+',1);renderDash(\'poll\')" style="background:none;border:none;color:#dc2626;font-size:16px;cursor:pointer">x</button>':'')+'</div>';}).join('');
  main.innerHTML='<div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:20px">'+
    '<h3 style="margin-bottom:14px">Create a Poll</h3>'+
    '<input id="pq" placeholder="Question..." style="width:100%;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px"/>'+
    '<div>'+oh+'</div>'+
    '<button onclick="S.popts.push(\'\');renderDash(\'poll\')" style="background:none;border:1px solid #e5e7eb;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;margin-bottom:12px">+ Add Option</button>'+
    '<br><button onclick="subPoll()" style="background:#059669;color:white;border:none;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Launch Poll</button>'+
    '<span id="plmsg" style="margin-left:10px;font-size:13px;color:#059669"></span></div>';
}

async function subPoll() {
  var q=document.getElementById('pq').value.trim();
  var opts=S.popts.filter(function(o){return o.trim();});
  if(!q||opts.length<2){alert('Enter question and at least 2 options.');return;}
  document.getElementById('plmsg').textContent='Launching...';
  var votes={};opts.forEach(function(o){votes[o]=0;});
  await fsAdd('updates',{type:'poll',question:q,options:opts,votes:votes,visibility:['all'],votedBy:[],createdAt:new Date().toISOString()});
  S.popts=['',''];
  await loadAllData();
  renderDash('feed');
}

async function renderAssocsPg(main) {
  S.assocs = await fsGet('associates');
  var rows=S.assocs.length===0?'<div style="text-align:center;padding:30px;color:#94a3b8">No associates yet.</div>':
    S.assocs.map(function(a){
      return '<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f1f5f9;flex-wrap:wrap">'+
        '<span style="font-weight:700;font-size:12px;width:80px">'+esc(a.id)+'</span>'+
        '<span style="flex:1;font-size:12px">'+esc(a.name)+'</span>'+
        '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+(a.status==='active'?'#d1fae5':'#f1f5f9')+';color:'+(a.status==='active'?'#059669':'#64748b')+'">'+a.status+'</span>'+
        (a.status==='active'?'<button onclick="togSt(\''+a.fid+'\',\'inactive\')" style="padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #e5e7eb;background:white">Deactivate</button>':'<button onclick="togSt(\''+a.fid+'\',\'active\')" style="padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #059669;color:#059669;background:white">Reactivate</button>')+
        '<button onclick="remAssoc(\''+a.fid+'\')" style="padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #fee2e2;color:#dc2626;background:white">Del</button>'+
        '</div>';
    }).join('');

  main.innerHTML='<div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:14px">'+
    '<h3 style="margin-bottom:14px">Add New Associate</h3>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
    '<input id="nid" placeholder="Employee ID (e.g. EMP005)" style="flex:1;min-width:120px;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none"/>'+
    '<input id="nnm" placeholder="Full Name" style="flex:1;min-width:120px;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none"/>'+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'+
    '<input id="npw" placeholder="Password" style="flex:1;min-width:120px;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none"/>'+
    '<select id="nrl" style="flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none"><option value="associate">Associate</option><option value="manager">Manager</option></select>'+
    '<select id="ngp" style="flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none"><option value="managers">Managers</option><option value="sales">Sales</option><option value="it">IT</option><option value="hr">HR</option><option value="operations">Operations</option></select>'+
    '</div>'+
    '<button onclick="addAssoc()" style="background:#059669;color:white;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">+ Add Associate</button>'+
    '<span id="amsg" style="margin-left:10px;font-size:13px;color:#059669"></span></div>'+
    '<div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:20px">'+
    '<h3 style="margin-bottom:14px">All Associates ('+S.assocs.length+')</h3>'+rows+'</div>';
}

async function addAssoc() {
  var id=document.getElementById('nid').value.trim().toUpperCase();
  var name=document.getElementById('nnm').value.trim();
  var pwd=document.getElementById('npw').value.trim();
  var role=document.getElementById('nrl').value;
  var group=document.getElementById('ngp').value;
  if(!id||!name||!pwd){alert('Fill all fields.');return;}
  if(S.assocs.find(function(a){return a.id===id;})){alert('ID already exists.');return;}
  document.getElementById('amsg').textContent='Adding...';
  await fsAdd('associates',{id:id,name:name,password:pwd,role:role,group:group,status:'active',createdAt:new Date().toISOString()});
  await renderAssocsPg(document.getElementById('dmain'));
  document.getElementById('amsg').textContent='Added!';
}

async function togSt(fid,ns) {
  await fsPatch('associates',fid,{status:ns});
  await renderAssocsPg(document.getElementById('dmain'));
}

async function remAssoc(fid) {
  if(!confirm('Delete permanently?'))return;
  await fsDel('associates',fid);
  await renderAssocsPg(document.getElementById('dmain'));
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

</script>

<div id="dashboard" style="display:none;background:#f8fafc;min-height:100vh">
  <div style="background:#111827;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px">
    <div style="color:white;font-size:16px;font-weight:800">HR <span style="color:#6ee7b7">Connect</span></div>
    <button onclick="location.reload()" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer">Sign out</button>
  </div>
  <div style="background:white;border-bottom:1px solid #e5e7eb;padding:0 22px" id="dnav"></div>
  <div style="max-width:900px;margin:0 auto;padding:20px 16px" id="dmain"></div>
</div>

</body>
</html>
